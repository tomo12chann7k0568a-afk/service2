<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はじめてのLIFF</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<header class="header">
<h1>サ</h1>
</header>

<div class="container">

  <div class="hero">
    <img src="https://github.com/tomo12chann7k0568a-afk/service2/raw/main/huum-Cu0CbpD87-s-unsplash.jpg" alt="サウナ">
    <div class="hero-text">おすすめのサウナを探してみよう！</div>
  </div>

  <div class="card">
    <h2>ととのうとは</h2>
    <p>
      発汗により、体内の老廃物がデトックスされて美肌効果に。<br>
      自律神経が整い、冷え性や肩こり改善。<br>
      ストレス軽減、集中力向上。
    </p>
  </div>

  <div class="card">
    <h2>サウナ種類</h2>
    <p>フィンランド式サウナなど...</p>
  </div>
</div>

<footer class="footer">

<div class="menu">

<div>♨️</div>
<div>🧴</div>
<div>🪑</div>
<div>🧺</div>
<div>🚿</div>

</div>

</footer>

<script>
async function main() {
  await liff.init({ liffId: "2008334930-gSjIpeR9" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const res = await fetch(
    "https://liff-api-xxxx.a.run.app/api/hello",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId: profile.userId
      })
    }
  );

  const data = await res.json();
  console.log(data);
}
main();
</script>
</body>
</html>

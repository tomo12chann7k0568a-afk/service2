<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はじめてのLIFF</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<header class="header">
<h1>サ</h1>
</header>

<section class="hero"></section>

<img src="https://d.kuku.lu/ujw3r2m6k" alt="サウナ">

<div class="hero-text">
おすすめのサウナを<br>
探してみよう！
</div>

<section class="card">

<h2>ととのうとは</h2>

<ul>

<li>発汗により、体内の老廃物がデトックスされて美肌効果。</li>

<li>血行がよくなるため、冷え性や肩こり、腰痛の改善に。</li>

<li>ストレス緩和、心状態の緩和、自律神経がととのう。</li>

<li>代謝がよくなり、痩せやすい体質に。</li>

</ul>

</section>

<section class="card">

<h2>サウナ種類</h2>

<h3>乾式サウナ</h3>

<div class="sauna-type">

<img src="https://images.unsplash.com/photo-1600334129128-685c5582fd35" alt="フィンランドサウナ">

<div class="sauna-text">

<h4>フィンランド式サウナ</h4>

<p>
サウナストーンにアロマ水をかけて蒸気を発生させる
「ロウリュ」で体感温度を上げ、本格的な発汗が楽しめる。
</p>

</div>

</div>

</section>

<footer class="footer">

<div class="menu">

<div>♨️</div>
<div>🧴</div>
<div>🪑</div>
<div>🧺</div>
<div>🚿</div>

</div>

</footer>

<script>
async function main() {
  await liff.init({ liffId: "2008334930-gSjIpeR9" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const res = await fetch(
    "https://liff-api-xxxx.a.run.app/api/hello",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId: profile.userId
      })
    }
  );

  const data = await res.json();
  console.log(data);
}
main();
</script>
</body>
</html>
